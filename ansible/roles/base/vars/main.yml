---

base_task_name: Update the operating system and install additional packages.
base_additional_packages:

  # OS family: Debian
  Debian:
    - bash-completion
    - ca-certificates
    - curl
    - git
    - net-tools
    - open-vm-tools
    - unzip
    - wget

  # OS family: RedHat
  RedHat:
    - ca-certificates
    - curl
    - git
    - kernel-devel
    - kernel-headers
    - net-tools
    - open-vm-tools
    - unzip
    - vim
    - wget

  FreeBSD:
    - bash
    - bash-completion
    - ca_root_nss
    - curl
    - doas
    - git
    - unzip
    - wget
