---
# Red Hat Enterprise Linux or derivative specific tasks.

# Tasks for disconnecting from Red Hat Subscription Manager.
- name: Disconnecting from Red Hat Subscription Manager.
  community.general.redhat_subscription:
    state: absent
  when: ansible_distribution == 'RedHat'

# Tasks for configuring SSH for public key authentication.
- name: Configuring SSH for Public Key Authentication without cloud-init.
  when: enable_cloudinit == 'false'
  block:
    - name: Disable root login
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: ^PermitRootLogin
        line: PermitRootLogin no
    - name: Enable public key authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: ^PubkeyAuthentication
        line: PubkeyAuthentication yes

# Tasks for configuring SSH for public key authentication.
- name: Configuring SSH for Public Key Authentication without cloud-init.
  when: enable_cloudinit == 'true'
  block:
    - name: Disable root login
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: ^PermitRootLogin
        line: PermitRootLogin no
    - name: Enable public key authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: ^PubkeyAuthentication
        line: PubkeyAuthentication yes
    - name: Enable password authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: ^PasswordAuthentication
        line: PasswordAuthentication yes

# Tasks for disabling cloud-init ssh module.
- name: Disable cloud-init ssh module
  when: enable_cloudinit == 'true'
  ansible.builtin.lineinfile:
    path: /etc/cloud/cloud.cfg
    regexp: "^ssh_pwauth: false"
    line: "ssh_pwauth: true"

# Task for setting the hostname.
- name: Setting the hostname.
  ansible.builtin.hostname:
    name: localhost

# Task for disabling SELinux.
- name: Disabling SELinux.
  ansible.posix.selinux:
    state: disabled
    policy: targeted

# Task for restarting the SSH daemon.
- name: Restarting the SSH daemon.
  ansible.builtin.systemd:
    name: sshd
    state: restarted
    daemon_reload: true

# Tasks for configuring cloud-init.
- name: Configuring cloud-init.
  when: enable_cloudinit == 'true'
  block:
    - name: "Message: Configuring cloud-init"
      ansible.builtin.debug:
        msg: Configuring cloud-init
    - name: Ensure disable_vmware_customization is set to false in cloud.cfg
      ansible.builtin.blockinfile:
        path: /etc/cloud/cloud.cfg
        block: |
          disable_vmware_customization: false
    - name: Set datasource_list in 90_dpkg.cfg
      ansible.builtin.copy:
        content: "datasource_list: [ VMware, OVF, None ]"
        dest: /etc/cloud/cloud.cfg.d/90_dpkg.cfg
        mode: "0644"

- name: Prevent multiple rescue images from accumulating
  when:
    - configure_prune_boot_rescue | bool
  block:
    - name: Ensure dnf post-transaction-actions plugin is present
      ansible.builtin.package:
        name: dnf-plugins-core
        state: present

    - name: Install /usr/local/sbin/boot-prune-rescue
      ansible.builtin.copy:
        src: boot-prune-rescue
        dest: /usr/local/sbin/boot-prune-rescue
        owner: root
        group: root
        mode: "0755"

    - name: Ensure post-transaction-actions.d exists
      ansible.builtin.file:
        path: /etc/dnf/plugins/post-transaction-actions.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Add DNF post-transaction action to prune rescue images
      ansible.builtin.copy:
        dest: /etc/dnf/plugins/post-transaction-actions.d/boot-prune-rescue.action
        owner: root
        group: root
        mode: "0644"
        content: |
          kernel*:any:/usr/local/sbin/boot-prune-rescue
          dracut*:any:/usr/local/sbin/boot-prune-rescue

    - name: Prune any existing extra rescue images now
      ansible.builtin.command: /usr/local/sbin/boot-prune-rescue
      changed_when: false
